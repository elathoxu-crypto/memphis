name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test CLI
        run: |
          # Test version
          node dist/cli/index.js --version

          # Test status (without ollama, will fail gracefully)
          node dist/cli/index.js status || true

          # Test help
          node dist/cli/index.js --help

      - name: Smoke test
        run: |
          # Create temp workspace
          mkdir -p /tmp/memphis-test
          cd /tmp/memphis-test

          # Test basic commands
          node $GITHUB_WORKSPACE/dist/cli/index.js init --skip-welcome || true
          node $GITHUB_WORKSPACE/dist/cli/index.js journal "Test from CI" --tags ci,test || true

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run build -- --noEmit

      - name: Check package.json
        run: |
          node -e "require('./package.json')"
          echo "✅ package.json valid"
